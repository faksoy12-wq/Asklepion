function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
}

const MONTHS_TR = [
  'Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran',
  'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'
];

const MONTHS_SHORT = [
  'Oca', 'Şub', 'Mar', 'Nis', 'May', 'Haz',
  'Tem', 'Ağu', 'Eyl', 'Eki', 'Kas', 'Ara'
];

function formatMonthYear(dateStr) {
  if (!dateStr) return 'Günümüz';
  const [year, month] = dateStr.split('-');
  return `${MONTHS_TR[parseInt(month) - 1]} ${year}`;
}

function formatMonthYearShort(dateStr) {
  if (!dateStr) return '';
  const [year, month] = dateStr.split('-');
  return `${MONTHS_SHORT[parseInt(month) - 1]} ${year.slice(2)}`;
}

function getCareerDuration(startDate) {
  const dateStr = startDate.length === 7 ? startDate + '-01' : startDate;
  const start = new Date(dateStr);
  if (isNaN(start.getTime())) return { years: 0, months: 0, days: 0 };
  
  const now = new Date();
  let years = now.getFullYear() - start.getFullYear();
  let months = now.getMonth() - start.getMonth();
  let days = now.getDate() - start.getDate();
  if (days < 0) {
    months--;
    days += new Date(now.getFullYear(), now.getMonth(), 0).getDate();
  }
  if (months < 0) {
    years--;
    months += 12;
  }
  return { years, months, days };
}

function getAllMonthsBetween(startDate, endDate) {
  const result = [];
  const startStr = startDate.length === 7 ? startDate + '-01' : startDate;
  const start = new Date(startStr);
  const endStr = endDate ? (endDate.length === 7 ? endDate + '-01' : endDate) : null;
  const end = endStr ? new Date(endStr) : new Date();
  const current = new Date(start);
  while (current <= end) {
    const y = current.getFullYear();
    const m = String(current.getMonth() + 1).padStart(2, '0');
    result.push(`${y}-${m}`);
    current.setMonth(current.getMonth() + 1);
  }
  return result;
}

// ─── STORAGE ──────────────────────────────────────────
const STORAGE_KEY = 'asklepion_data';

function getDefaultData() {
  return {
    physician: { name: '', title: '', careerStartDate: '' },
    careerStops: [],
    onboardingComplete: false,
  };
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { console.error('Storage read error:', e); }
  return getDefaultData();
}

function saveData(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) { console.error('Storage write error:', e); }
}

function exportData() {
  const data = loadData();
  return JSON.stringify(data, null, 2);
}

function importDataFromJSON(json) {
  try {
    const data = JSON.parse(json);
    if (data.physician && data.careerStops !== undefined) {
      saveData(data);
      return data;
    }
    return null;
  } catch (e) { return null; }
}

// ─── NUMBER TICKER ────────────────────────────────────
function NumberTicker({ value, duration = 1200 }) {
  const [display, setDisplay] = useState(0);
  const frameRef = useRef(null);

  useEffect(() => {
    const start = display;
    const end = value;
    const startTime = performance.now();

    function tick(now) {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / duration, 1);
      // ease out quart
      const eased = 1 - Math.pow(1 - progress, 4);
      setDisplay(Math.round(start + (end - start) * eased));
      if (progress < 1) {
        frameRef.current = requestAnimationFrame(tick);
      }
    }
    frameRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(frameRef.current);
  }, [value]);

  return value.toLocaleString('tr-TR').split('').map((char, i) => {
    const displayStr = display.toLocaleString('tr-TR');
    return (
      <span key={i} style={{ display: 'inline-block' }}>
        {displayStr[i] || ''}
      </span>
    );
  });
}

// ─── SPOTLIGHT CARD ───────────────────────────────────
function SpotlightCard({ children, className = '', style = {}, ...props }) {
  const cardRef = useRef(null);
  const glowRef = useRef(null);

  const handleMove = useCallback((clientX, clientY) => {
    if (!cardRef.current || !glowRef.current) return;
    const rect = cardRef.current.getBoundingClientRect();
    const x = clientX - rect.left;
    const y = clientY - rect.top;
    glowRef.current.style.left = x + 'px';
    glowRef.current.style.top = y + 'px';
    glowRef.current.style.opacity = '1';
  }, []);

  const handleLeave = useCallback(() => {
    if (glowRef.current) glowRef.current.style.opacity = '0';
  }, []);

  return (
    <div
      ref={cardRef}
      className={`spotlight-card ${className}`}
      style={style}
      onMouseMove={(e) => handleMove(e.clientX, e.clientY)}
      onTouchMove={(e) => handleMove(e.touches[0].clientX, e.touches[0].clientY)}
      onMouseLeave={handleLeave}
      onTouchEnd={handleLeave}
      {...props}
    >
      <div ref={glowRef} className="spotlight-glow" />
      {children}
    </div>
  );
}

// ─── TOAST ────────────────────────────────────────────
function Toast({ message, show, onHide }) {
  useEffect(() => {
    if (show) {
      const timer = setTimeout(onHide, 2500);
      return () => clearTimeout(timer);
    }
  }, [show]);

  if (!show) return null;
  return (
    <div className="toast toast-success">
      <Icons.Check /> {message}
    </div>
  );
}

// ─── CONFIRM DIALOG ───────────────────────────────────
function ConfirmDialog({ show, title, description, onConfirm, onCancel, confirmText = 'Onayla', danger = false }) {
  if (!show) return null;
  return (
    <div className="confirm-overlay" onClick={onCancel}>
      <div className="confirm-dialog" onClick={e => e.stopPropagation()}>
        <div className="confirm-title">{title}</div>
        <div className="confirm-desc">{description}</div>
        <div className="confirm-actions">
          <button className="btn-secondary" onClick={onCancel}>İptal</button>
          <button className={danger ? 'btn-danger' : 'btn-primary'} onClick={onConfirm}>
            {confirmText}
          </button>
        </div>
      </div>
    </div>
  );
}

    setPastStops(pastStops.filter(s => s.id !== id));
  }

  function updatePastStop(id, field, value) {
    setPastStops(pastStops.map(s => s.id === id ? { ...s, [field]: value } : s));
  }

  function canProceed() {
    switch (step) {
      case 0: return !!startDate;
      case 1: return name.trim().length > 0;
      case 2: return currentInstitution.trim().length > 0;
      case 3: return true;
      default: return false;
    }
  }

  function handleFinish() {
    const careerStops = [];

    // Add past stops
    pastStops.forEach(ps => {
      if (ps.institution.trim()) {
        careerStops.push({
          id: ps.id,
          institution: ps.institution,
          department: ps.department,
          role: ps.role || 'Pratisyen Hekim',
          startDate: ps.startDate,
          endDate: ps.endDate ? ps.endDate : null,
          monthlyPatients: {},
        });
      }
    });

    // Add current stop
    careerStops.push({
      id: generateId(),
      institution: currentInstitution,
      department: currentDepartment,
      role: currentRole,
      startDate: careerStops.length > 0 && careerStops[careerStops.length - 1].endDate
        ? careerStops[careerStops.length - 1].endDate
        : startDate,
      endDate: null,
      monthlyPatients: {},
    });

    const newData = {
      physician: {
        name: name,
        title: title || currentRole,
        careerStartDate: startDate,
      },
      careerStops,
      onboardingComplete: true,
    };

    setData(newData);
    saveData(newData);
  }

  const currentYear = new Date().getFullYear();
  const years = [];
  for (let y = currentYear; y >= 1970; y--) years.push(y);

  const renderStep = () => {
    switch (step) {
      case 0:
        return (
          <div className="step-content" key="step-0">
            <div className="step-question">Kutsal mesleğinize ne zaman başladınız?</div>
            <p className="step-subtitle">Hekimlik yolculuğunuzun başlangıç tarihini seçin.</p>
            <div className="form-group">
              <label className="form-label">Başlangıç Tarihi</label>
              <input
                className="form-input"
                type="date"
                value={startDate}
                onChange={e => setStartDate(e.target.value)}
              />
            </div>
          </div>
        );

      case 1:
        return (
          <div className="step-content" key="step-1">
            <div className="step-question">Hekimlik isminiz ve unvanınız nedir?</div>
            <p className="step-subtitle">Platformda gösterilecek isminizi girin.</p>
            <div className="form-group">
              <label className="form-label">İsim</label>
              <input
                className="form-input"
                type="text"
                placeholder="Örn: Dr. Furkan Aksoy"
                value={name}
                onChange={e => setName(e.target.value)}
                autoFocus
              />
            </div>
            <div className="form-group">
              <label className="form-label">Unvan (Opsiyonel)</label>
              <input
                className="form-input"
                type="text"
                placeholder="Örn: Pratisyen Hekim"
                value={title}
                onChange={e => setTitle(e.target.value)}
              />
            </div>
          </div>
        );

      case 2:
        return (
          <div className="step-content" key="step-2">
            <div className="step-question">Şu anki aktif Görev Yeriniz nedir?</div>
            <p className="step-subtitle">Mevcut çalıştığınız kurum bilgilerini girin.</p>
            <div className="form-group">
              <label className="form-label">Kurum Adı</label>
              <input
                className="form-input"
                type="text"
                placeholder="Örn: Keklikova Aile Sağlığı Merkezi"
                value={currentInstitution}
                onChange={e => setCurrentInstitution(e.target.value)}
                autoFocus
              />
            </div>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Bölüm / Birim</label>
                <input
                  className="form-input"
                  type="text"
                  placeholder="Örn: ASM"
                  value={currentDepartment}
                  onChange={e => setCurrentDepartment(e.target.value)}
                />
              </div>
              <div className="form-group">
                <label className="form-label">Pozisyon</label>
                <input
                  className="form-input"
                  type="text"
                  placeholder="Pratisyen Hekim"
                  value={currentRole}
                  onChange={e => setCurrentRole(e.target.value)}
                />
              </div>
            </div>
          </div>
        );

      case 3:
        return (
          <div className="step-content" key="step-3">
            <div className="step-question">Geçmiş görev yerlerini eklemek ister misiniz?</div>
            <p className="step-subtitle">Önceki kariyer duraklarınızı ekleyin. Daha sonra da ekleyebilirsiniz.</p>

            <div className="career-stop-list">
              {pastStops.map((stop, idx) => (
                <div key={stop.id} className="career-stop-item">
                  <button className="remove-btn" onClick={() => removePastStop(stop.id)}>×</button>
                  <div className="form-group">
                    <label className="form-label">Kurum Adı</label>
                    <input
                      className="form-input"
                      type="text"
                      placeholder="Örn: Erciş Devlet Hastanesi"
                      value={stop.institution}
                      onChange={e => updatePastStop(stop.id, 'institution', e.target.value)}
                    />
                  </div>
                  <div className="form-row">
                    <div className="form-group">
                      <label className="form-label">Bölüm</label>
                      <input
                        className="form-input"
                        type="text"
                        placeholder="ACİL"
                        value={stop.department}
                        onChange={e => updatePastStop(stop.id, 'department', e.target.value)}
                      />
                    </div>
                    <div className="form-group">
                      <label className="form-label">Pozisyon</label>
                      <input
                        className="form-input"
                        type="text"
                        placeholder="Pratisyen Hekim"
                        value={stop.role}
                        onChange={e => updatePastStop(stop.id, 'role', e.target.value)}
                      />
                    </div>
                  </div>
                  <div className="form-row">
                    <div className="form-group">
                      <label className="form-label">Başlangıç</label>
                      <input className="form-input" type="date" value={stop.startDate} onChange={e => updatePastStop(stop.id, 'startDate', e.target.value)} />
                    </div>
                    <div className="form-group">
                      <label className="form-label">Bitiş</label>
                      <input className="form-input" type="date" value={stop.endDate || ''} onChange={e => updatePastStop(stop.id, 'endDate', e.target.value || null)} />
                    </div>
                  </div>
                </div>
              ))}
            </div>

            <button className="add-stop-btn" onClick={addPastStop}>
              <Icons.Plus /> Geçmiş görev yeri ekle
            </button>
          </div>
        );
    }
  };

  return (
    <div className="onboarding-container">
      <div className="onboarding-card">
        <div className="onboarding-logo">
          <Icons.Logo size={64} />
          <h1>Asklepion</h1>
          <p>Hekim Kariyer Günlüğü</p>
        </div>

        <div className="progress-bar-container">
          <div
            className="progress-bar-fill"
            style={{ width: `${((step + 1) / totalSteps) * 100}%` }}
          />
        </div>

        {renderStep()}

        <div className="btn-row">
          {step > 0 && (
            <button className="btn-secondary" onClick={() => setStep(step - 1)}>
              Geri
            </button>
          )}
          {step < totalSteps - 1 ? (
            <button
              className="btn-primary"
              disabled={!canProceed()}
              onClick={() => setStep(step + 1)}
            >
              Devam
            </button>
          ) : (
            <button className="btn-primary" onClick={handleFinish} style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px' }}>
              <Icons.Check /> Başlayalım
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── STATS GRID ───────────────────────────────────────
function StatsGrid() {
  const { data } = useApp();

  const activeStop = data.careerStops.find(s => !s.endDate);
  const totalStops = data.careerStops.length;

  const monthlyAvg = useMemo(() => {
    let totalPatients = 0;
    let totalMonths = 0;
    data.careerStops.forEach(stop => {
      const vals = Object.values(stop.monthlyPatients || {});
      vals.forEach(v => {
        totalPatients += Number(v) || 0;
        totalMonths += 1;
      });
    });
    return totalMonths === 0 ? 0 : Math.round(totalPatients / totalMonths);
  }, [data.careerStops]);

  const careerPeak = useMemo(() => {
    let peak = 0;
    let peakKey = null;
    data.careerStops.forEach(stop => {
      const vals = Object.entries(stop.monthlyPatients || {});
      vals.forEach(([k, v]) => {
        const num = Number(v) || 0;
        if (num > peak) {
          peak = num;
          peakKey = k;
        }
      });
    });
    return { peak, peakKey };
  }, [data.careerStops]);

  return (
    <>
      <SpotlightCard>
        <div className="stat-card-label">
          <Icons.Building /> GÖREV YERİ
        </div>
        <div className="stat-card-value" style={{ fontSize: '1rem', fontWeight: 600 }}>
          {activeStop ? activeStop.institution : '—'}
        </div>
        {activeStop && activeStop.department && (
          <div className="stat-card-subtext">{activeStop.department} • {activeStop.role}</div>
        )}
      </SpotlightCard>

      <SpotlightCard>
        <div className="stat-card-label">
          <Icons.Activity /> AYLIK ORTALAMA
        </div>
        <div className="stat-card-value">
          <NumberTicker value={monthlyAvg} />
        </div>
        <div className="stat-card-subtext">hasta / ay</div>
      </SpotlightCard>

      <SpotlightCard>
        <div className="stat-card-label">
          <Icons.Star /> KARİYER ZİRVESİ
        </div>
        <div className="stat-card-value">
          <NumberTicker value={careerPeak.peak} />
        </div>
        <div className="stat-card-subtext">{careerPeak.peakKey ? formatMonthYear(careerPeak.peakKey) : 'Henüz veri yok'}</div>
      </SpotlightCard>

      <SpotlightCard>
        <div className="stat-card-label">
          <Icons.MapPin /> TOPLAM DURAK
        </div>
        <div className="stat-card-value">{totalStops}</div>
        <div className="stat-card-subtext">görev yeri</div>
      </SpotlightCard>
    </>
  );
}

// ─── CAREER CHART ─────────────────────────────────────
function CareerChart() {
  const { data } = useApp();
  const [clickedKey, setClickedKey] = useState(null);

  const CustomTooltip = ({ active, payload, label }) => {
    if (!active || !payload || !payload.length || typeof payload[0].value !== 'number') return null;
    if (label !== clickedKey) return null;
    return (
      <div className="custom-tooltip">
        <div className="custom-tooltip-label">{formatMonthYear(label)}</div>
        <div className="custom-tooltip-value">{payload[0].value.toLocaleString('tr-TR')} hasta</div>
      </div>
    );
  };

  const chartData = useMemo(() => {
    const monthMap = {};

    data.careerStops.forEach(stop => {
      Object.entries(stop.monthlyPatients || {}).forEach(([month, count]) => {
        monthMap[month] = (monthMap[month] || 0) + Number(count);
      });
    });

    const entries = Object.entries(monthMap).sort(([a], [b]) => a.localeCompare(b));
    return entries.map(([month, count]) => ({
      month,
      label: formatMonthYearShort(month),
      patients: count,
    }));
  }, [data]);

  // Find milestone dates (career stop transitions)
  const milestones = useMemo(() => {
    return data.careerStops.map(stop => ({
      date: stop.startDate,
      label: stop.institution,
      department: stop.department,
    }));
  }, [data]);

  if (chartData.length === 0) {
    return (
      <div className="chart-container">
        <div className="chart-title">Hasta Takip Grafiği</div>
        <div className="empty-state">
          <Icons.Chart />
          <p>Henüz veri yok. Hasta sayılarını girmeye başladığınızda grafiğiniz burada görünecek.</p>
        </div>
      </div>
    );
  }

  return (
    <div className="chart-container">
      <div className="chart-title">Hasta Takip Grafiği</div>
      <div style={{ width: '100%', overflowX: 'auto', overflowY: 'hidden', WebkitOverflowScrolling: 'touch', scrollbarWidth: 'none' }}>
        <div style={{ minWidth: Math.max(100, chartData.length * 8) + '%', height: 260 }}>
          <ResponsiveContainer width="100%" height="100%">
          <AreaChart
            data={chartData}
            margin={{ top: 10, right: 8, left: -20, bottom: 0 }}
            onClick={(e) => {
              if (e && e.activeLabel) {
                setClickedKey(prev => prev === e.activeLabel ? null : e.activeLabel);
              } else {
                setClickedKey(null);
              }
            }}
          >
            <defs>
              <linearGradient id="goldGradient" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#D4AF37" stopOpacity={0.3} />
                <stop offset="100%" stopColor="#D4AF37" stopOpacity={0} />
              </linearGradient>
              <filter id="chartGlow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="3" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
              </filter>
            </defs>
            <CartesianGrid strokeDasharray="3 3" vertical={false} />
            <XAxis
              dataKey="month"
              tickFormatter={formatMonthYearShort}
              tick={{ fontSize: 10 }}
              interval="preserveStartEnd"
              axisLine={{ stroke: 'rgba(255,255,255,0.06)' }}
              tickLine={false}
            />
            <YAxis
              tick={{ fontSize: 10 }}
              axisLine={false}
              tickLine={false}
            />
            <Tooltip content={<CustomTooltip />} cursor={clickedKey ? { stroke: 'rgba(212, 175, 55, 0.4)', strokeWidth: 1 } : false} />
            <Area
              type="monotone"
              dataKey="patients"
              stroke="#D4AF37"
              strokeWidth={2.5}
              fill="url(#goldGradient)"
              style={{ filter: 'url(#chartGlow)' }}
              dot={{ r: 3, fill: '#D4AF37', strokeWidth: 0 }}
              activeDot={{ r: 5, fill: '#F5D063', strokeWidth: 2, stroke: '#D4AF37' }}
            />
            {milestones.map((m, idx) => (
              <ReferenceLine
                key={idx}
                x={m.date ? m.date.slice(0, 7) : ''}
                stroke="rgba(212, 175, 55, 0.8)"
                strokeDasharray="4 4"
                strokeWidth={2}
                label={{
                  value: m.label.length > 15 ? m.label.slice(0, 15) + '...' : m.label,
                  position: 'insideTopLeft',
                  fill: '#F5D063',
                  fontSize: 10,
                  fontWeight: 600,
                  dy: 10,
                  dx: 5
                }}
              />
            ))}
          </AreaChart>
          </ResponsiveContainer>
        </div>
      </div>
    </div>
  );
}

// ─── PATIENT ENTRY SHEET ──────────────────────────────
function PatientEntrySheet({ onClose }) {
  const { data, setData } = useApp();
  const [month, setMonth] = useState(String(new Date().getMonth() + 1));
  const [year, setYear] = useState(String(new Date().getFullYear()));
  const [count, setCount] = useState('');
  const [toast, setToast] = useState(false);

  const activeStop = data.careerStops.find(s => !s.endDate);

  const targetStop = useMemo(() => {
    const key = `${year}-${month.padStart(2, '0')}`;
    return [...data.careerStops].reverse().find(stop => {
      const startKey = stop.startDate ? stop.startDate.slice(0, 7) : '';
      const endKey = stop.endDate ? stop.endDate.slice(0, 7) : null;
      const isAfterStart = startKey <= key;
      const isBeforeEnd = !endKey || endKey >= key;
      return isAfterStart && isBeforeEnd;
    }) || activeStop;
  }, [data.careerStops, year, month, activeStop]);

  function handleSave() {
    if (!count || !targetStop) return;

    const key = `${year}-${month.padStart(2, '0')}`;
    const newData = { ...data };
    const stopIndex = newData.careerStops.findIndex(s => s.id === targetStop.id);
    if (stopIndex === -1) return;
    newData.careerStops[stopIndex] = {
      ...newData.careerStops[stopIndex],
      monthlyPatients: {
        ...newData.careerStops[stopIndex].monthlyPatients,
        [key]: Number(count),
      },
    };

    setData(newData);
    saveData(newData);
    setToast(true);
    setTimeout(() => {
      setToast(false);
    }, 1500);
  }

  const currentYear = new Date().getFullYear();
  const startYear = data.physician.careerStartDate ? parseInt(data.physician.careerStartDate.slice(0, 4)) : 2000;
  const years = [];
  for (let y = 2050; y >= startYear; y--) years.push(y);

  const existingKey = `${year}-${month.padStart(2, '0')}`;
  const existingValue = targetStop?.monthlyPatients?.[existingKey];

  return (
    <>
      <div className="sheet-overlay" onClick={onClose} />
      <div className="sheet-container">
        <div className="sheet-handle" />
        <div className="sheet-title">Hasta Sayısı Gir</div>

        {targetStop && (
          <div style={{ fontSize: '0.8125rem', color: 'var(--text-secondary)', marginBottom: 'var(--space-lg)', display: 'flex', alignItems: 'center', gap: '4px' }}>
            <span style={{ color: 'var(--gold-400)', display: 'flex' }}><Icons.MapPin /></span>
            {targetStop.institution}
            {targetStop.department ? ` — ${targetStop.department}` : ''}
          </div>
        )}

        <div className="form-row">
          <div className="form-group">
            <label className="form-label">Ay</label>
            <select className="form-select" value={month} onChange={e => setMonth(e.target.value)}>
              {MONTHS_TR.map((m, i) => (
                <option key={i} value={String(i + 1)}>{m}</option>
              ))}
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">Yıl</label>
            <select className="form-select" value={year} onChange={e => setYear(e.target.value)}>
              {years.map(y => (
                <option key={y} value={String(y)}>{y}</option>
              ))}
            </select>
          </div>
        </div>

        <div className="form-group">
          <label className="form-label">
            Hasta Sayısı
            {existingValue && (
              <span style={{ color: 'var(--gold-400)', marginLeft: 8, textTransform: 'none', letterSpacing: 0 }}>
                (mevcut: {existingValue})
              </span>
            )}
          </label>
          <input
            className="form-input"
            type="number"
            inputMode="numeric"
            placeholder="Örn: 450"
            value={count}
            onChange={e => setCount(e.target.value)}

// ─── MINI SPARKLINE ───────────────────────────────────
function MiniSparkline({ data, color = '#10b981', height = 40 }) {
  if (!data || data.length < 2) return null;
  const max = Math.max(...data);
  const min = Math.min(...data);
  const range = max - min || 1;
  const w = 120;
  const h = height;
  const points = data.map((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((v - min) / range) * (h - 4) - 2;
    return `${x},${y}`;
  }).join(' ');

  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{ opacity: 0.5 }}>
      <defs>
        <linearGradient id={`spark-${color.replace('#','')}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity={0.3} />
          <stop offset="100%" stopColor={color} stopOpacity={0} />
        </linearGradient>
      </defs>
      <polyline
        points={points}
        fill="none"
        stroke={color}
        strokeWidth="2"
        strokeLinecap="round"
        strokeLinejoin="round"
      />
      <polygon
        points={`0,${h} ${points} ${w},${h}`}
        fill={`url(#spark-${color.replace('#','')})`}
      />
    </svg>
  );
}

// ─── STATS PAGE ───────────────────────────────────────
function StatsPage() {
  const { data } = useApp();
  const [examDuration, setExamDuration] = useState(3);

  // ── Core Calculations ──
  const totalPatients = useMemo(() => {
    let total = 0;
    data.careerStops.forEach(stop => {
      Object.values(stop.monthlyPatients || {}).forEach(v => {
        total += Number(v) || 0;
      });
    });
    return total;
  }, [data]);

  // ── Time Alchemy ──
  const totalHours = Math.round(totalPatients * examDuration / 60);
  const totalDays = (totalHours / 24).toFixed(1);
  const filmCount = Math.round(totalHours / 2.5);
  const worldTours = (totalHours / 48).toFixed(1);

  // ── Clinical Marathon ──
  const totalSteps = totalPatients * 10;
  const totalKm = (totalSteps * 0.75 / 1000).toFixed(1);
  const istanbulLength = 150; // km
  const istanbulRoundTrips = (parseFloat(totalKm) / (istanbulLength * 2)).toFixed(1);

  // ── Last 6 months sparkline data ──
  const last6Months = useMemo(() => {
    const now = new Date();
    const months = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      months.push(key);
    }
    return months.map(key => {
      let total = 0;
      data.careerStops.forEach(stop => {
        total += Number(stop.monthlyPatients?.[key]) || 0;
      });
      return total;
    });
  }, [data]);

  // ── Stop Comparison (Klinik Tempo) ──
  const stopStats = useMemo(() => {
    return data.careerStops.map(stop => {
      const entries = Object.entries(stop.monthlyPatients || {});
      const totalP = entries.reduce((sum, [, v]) => sum + (Number(v) || 0), 0);
      const monthCount = entries.length || 1;
      const avg = Math.round(totalP / monthCount);
      return {
        id: stop.id,
        name: stop.institution,
        department: stop.department,
        role: stop.role,
        total: totalP,
        avg,
        months: monthCount,
        isActive: !stop.endDate,
      };
    });
  }, [data]);

  const busiestStop = stopStats.reduce((a, b) => (a.avg > b.avg ? a : b), stopStats[0]);
  const calmestStop = stopStats.reduce((a, b) => (a.avg < b.avg ? a : b), stopStats[0]);
  const intensityDiff = busiestStop && calmestStop && calmestStop.avg > 0
    ? Math.round(((busiestStop.avg - calmestStop.avg) / busiestStop.avg) * 100)
    : 0;

  // ── Peak Month Analysis (Kariyer Evrimi) ──
  const peakMonthAnalysis = useMemo(() => {
    const monthBuckets = {};
    data.careerStops.forEach(stop => {
      Object.entries(stop.monthlyPatients || {}).forEach(([key, val]) => {
        const m = parseInt(key.split('-')[1]);
        if (!monthBuckets[m]) monthBuckets[m] = [];
        monthBuckets[m].push(Number(val) || 0);
      });
    });

    let peakMonth = null;
    let peakAvg = 0;
    Object.entries(monthBuckets).forEach(([m, vals]) => {
      const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
      if (avg > peakAvg) {
        peakAvg = avg;
        peakMonth = parseInt(m);
      }
    });

    const seasons = { 12: 'Kış', 1: 'Kış', 2: 'Kış', 3: 'İlkbahar', 4: 'İlkbahar', 5: 'İlkbahar', 6: 'Yaz', 7: 'Yaz', 8: 'Yaz', 9: 'Sonbahar', 10: 'Sonbahar', 11: 'Sonbahar' };
    return {
      monthName: peakMonth ? MONTHS_TR[peakMonth - 1] : '—',
      season: peakMonth ? seasons[peakMonth] : '',
      avg: Math.round(peakAvg),
    };
  }, [data]);

  // ── Year-over-Year comparison ──
  const yoyComparison = useMemo(() => {
    const now = new Date();
    const currentKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    const lastYearKey = `${now.getFullYear() - 1}-${String(now.getMonth() + 1).padStart(2, '0')}`;

    let currentVal = 0, lastYearVal = 0;
    data.careerStops.forEach(stop => {
      currentVal += Number(stop.monthlyPatients?.[currentKey]) || 0;
      lastYearVal += Number(stop.monthlyPatients?.[lastYearKey]) || 0;
    });

    const diff = lastYearVal > 0 ? Math.round(((currentVal - lastYearVal) / lastYearVal) * 100) : null;
    return { current: currentVal, lastYear: lastYearVal, diff };
  }, [data]);

  if (totalPatients === 0) {
    return (
      <div className="stats-page">
        <div className="stats-page-header">
          <div className="stats-page-title">İstatistikler</div>
          <div className="stats-page-subtitle">Zamanın Simyası</div>
        </div>
        <div className="stats-empty">
          <div className="stats-empty-icon"><Icons.BarChart3 /></div>
          <p>Henüz hasta verisi girilmedi. Veri girmeye başladığınızda kariyer hikayeniz burada canlanacak.</p>
        </div>
      </div>
    );
  }

  return (
    <div className="stats-page">
      <div className="stats-page-header">
        <div className="stats-page-title">İstatistikler</div>
        <div className="stats-page-subtitle">Zamanın Simyası</div>
      </div>

      {/* ─── KART 1: ZAMANIN SİMYASI ─── */}
      <div className="stats-hero-card">
        <div className="stats-card-glow stats-glow-emerald" />
        <div className="stats-card-icon"><Icons.Timer /></div>
        <div className="stats-card-section-title">Zamanın Simyası</div>

        <div className="stats-hero-metrics">
          <div className="stats-metric-big">
            <span className="stats-metric-number emerald"><NumberTicker value={totalHours} /></span>
            <span className="stats-metric-unit">saat</span>
          </div>
        </div>

        <p className="stats-narrative">
          Klinik pratiğinizde toplamda <strong className="text-emerald">{totalHours.toLocaleString('tr-TR')} saat</strong> boyunca
          kesintisiz şifa dağıttınız. Bu, ömrünüzün <strong className="text-gold">{totalDays} gününü</strong> sadece
          başkalarının sağlığına adadığınız anlamına geliyor.
        </p>

        <p className="stats-narrative" style={{ marginTop: 'var(--space-md)' }}>
          Hastalarınızı <strong className="text-emerald">{totalHours.toLocaleString('tr-TR')} saat</strong> boyunca

        <div className="stats-quote">
          "Her adım bir teşhis, her kilometre binlerce şifa..."
        </div>
      </div>

      {/* ─── KART 3: KLİNİK TEMPO ─── */}
      {stopStats.length > 0 && (
        <div className="stats-bento-card">
          <div className="stats-card-glow stats-glow-emerald" />
          <div className="stats-card-icon"><Icons.Zap /></div>
          <div className="stats-card-section-title">Klinik Tempo</div>

          <div className="stats-tempo-table">
            {stopStats.map(stop => (
              <div key={stop.id} className={`stats-tempo-row ${stop.isActive ? 'active' : ''}`}>
                <div className="stats-tempo-name">
                  <span className="stats-tempo-institution">{stop.name}</span>
                  {stop.department && <span className="stats-tempo-dept">{stop.department}</span>}
                </div>
                <div className="stats-tempo-stats">
                  <div className="stats-tempo-avg">
                    <span className="stats-tempo-avg-value">{stop.avg}</span>
                    <span className="stats-tempo-avg-label">ort/ay</span>
                  </div>
                  <div className="stats-tempo-total">
                    <span className="stats-tempo-total-value">{stop.total.toLocaleString('tr-TR')}</span>
                    <span className="stats-tempo-total-label">toplam</span>
                  </div>
                </div>
              </div>
            ))}
          </div>

          {stopStats.length >= 2 && busiestStop && calmestStop && intensityDiff > 0 && (
            <div className="stats-insight">
              <Icons.TrendingUp />
              <span>
                <strong>{calmestStop.name}</strong>, <strong>{busiestStop.name}</strong>'e göre <span className="text-emerald">%{intensityDiff} daha düşük yoğunluk</span>, daha derin şifa.
              </span>
            </div>
          )}

          <div className="stats-quote">
            "Tempo değişir, şifaya olan bağlılık baki kalır."
          </div>
        </div>
      )}

      {/* ─── KART 4: KARİYER EVRİMİ ─── */}
      <div className="stats-bento-card">
        <div className="stats-card-glow stats-glow-gold" />
        <div className="stats-card-icon"><Icons.TrendingUp /></div>
        <div className="stats-card-section-title">Kariyer Evrimi</div>

        <div className="stats-evolution-grid">
          <div className="stats-evo-item">
            <div className="stats-evo-label">En Yoğun Ay</div>
            <div className="stats-evo-value gold">{peakMonthAnalysis.monthName}</div>
            <div className="stats-evo-sub">{peakMonthAnalysis.season} Sezonu • Ort. {peakMonthAnalysis.avg} hasta</div>
          </div>

          {yoyComparison.diff !== null && (
            <div className="stats-evo-item">
              <div className="stats-evo-label">Geçen Yıla Göre</div>
              <div className={`stats-evo-value ${yoyComparison.diff >= 0 ? 'emerald' : 'gold'}`}>
                {yoyComparison.diff >= 0 ? '+' : ''}{yoyComparison.diff}%
              </div>
              <div className="stats-evo-sub">{MONTHS_TR[new Date().getMonth()]} ayı kıyası</div>
            </div>
          )}
        </div>

        <div className="stats-sparkline-row" style={{ marginTop: 'var(--space-lg)' }}>
          <MiniSparkline data={last6Months} color="#10b981" height={50} />
          <span className="stats-sparkline-label">6 aylık trend</span>
        </div>

        <div className="stats-quote">
          "Bilgi birikir, tecrübe ise zamanla demlenir."
        </div>
      </div>

    </div>
  );
}

// ─── BOTTOM NAV ───────────────────────────────────────
function BottomNav({ activeTab, onTabChange }) {
  const tabs = [
    { id: 'dashboard', label: 'Anasayfa', icon: Icons.Home },
    { id: 'career', label: 'Kariyer', icon: Icons.Chart },
    { id: 'stats', label: 'İstatistik', icon: Icons.BarChart3 },
    { id: 'settings', label: 'Ayarlar', icon: Icons.Settings },
  ];

  return (
    <nav className="bottom-nav">
      {tabs.map(tab => (
        <button
          key={tab.id}
          className={`nav-item ${activeTab === tab.id ? 'active' : ''}`}
          onClick={() => onTabChange(tab.id)}
        >
          <tab.icon />
          <span className="nav-item-label">{tab.label}</span>
        </button>
      ))}
    </nav>
  );
}

// ─── MAIN APP ─────────────────────────────────────────
function App() {
  const [data, setData] = useState(loadData);
  const [activeTab, setActiveTab] = useState('dashboard');
  const [sheet, setSheet] = useState(null); // null | 'options' | 'patient' | 'careerStop'

  const contextValue = useMemo(() => ({ data, setData }), [data]);

  // Redirect to onboarding if not complete
  if (!data.onboardingComplete) {
    return (
      <AppContext.Provider value={contextValue}>
        <OnboardingWizard />
      </AppContext.Provider>
    );
  }

  const renderPage = () => {
    switch (activeTab) {
      case 'dashboard': return <Dashboard />;
      case 'career': return <CareerPage />;
      case 'stats': return <StatsPage />;
      case 'settings': return <SettingsPage onEditProfile={() => setSheet('profileEdit')} />;
      default: return <Dashboard />;
    }
  };

  return (
    <AppContext.Provider value={contextValue}>
      <div className="app-layout">
        {renderPage()}

        {/* FAB — on dashboard, career, and stats */}
        {(activeTab === 'dashboard' || activeTab === 'career' || activeTab === 'stats') && (
          <button className="fab" onClick={() => setSheet('options')}>
            <Icons.Plus />
          </button>
        )}

        <BottomNav activeTab={activeTab} onTabChange={setActiveTab} />

        {/* Sheets */}
        {sheet === 'options' && (
          <EntryOptionsSheet
            onClose={() => setSheet(null)}
            onSelectPatient={() => setSheet('patient')}
            onSelectCareerStop={() => setSheet('careerStop')}
          />
        )}
        {sheet === 'patient' && (
          <PatientEntrySheet onClose={() => setSheet(null)} />
        )}
        {sheet === 'careerStop' && (
          <CareerStopSheet onClose={() => setSheet(null)} />
        )}
        {sheet === 'profileEdit' && (
          <ProfileEditSheet onClose={() => setSheet(null)} />
        )}
      </div>
    </AppContext.Provider>
  );
}

// ─── MOUNT ────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(<App />);

</script>
</body>
</html>
